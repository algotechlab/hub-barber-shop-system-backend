name: CI/CD Workflow

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      # Checkout do código do repositório
      - name: Checkout code
        uses: actions/checkout@v4

      # Configuração do Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Instalar Poetry
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Configurar Poetry para criar .venv no repo (facilita cache)
      - name: Configure Poetry
        run: |
          poetry --version
          poetry config virtualenvs.in-project true

      # Cache para dependências Poetry
      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('pyproject.toml', 'poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      # Instalar dependências (incluindo dev)
      - name: Install dependencies
        run: poetry install --with dev

      # Rodar lint (sem auto-fix / sem modificar arquivos no CI)
      - name: Lint
        run: poetry run task lint

      # Rodar testes unitários com cobertura >= 98%
      - name: Run unit tests (coverage >= 98%)
        run: |
          poetry run pytest -m unit --cov=src --cov-report=term-missing:skip-covered --cov-fail-under=98 -vv

