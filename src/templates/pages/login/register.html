{% extends 'base.html' %}

{% block content %}
<div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-md">
  <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Cadastro</h2>
  <form action="{% url 'users:register' %}" method="POST" class="space-y-5">
    {% csrf_token %}
    <div>
      <label class="block mb-1 font-medium text-gray-700" for="username">Usuário:</label>
      <input type="text" id="username" name="username" required class="w-full border rounded-lg px-4 py-2" />
    </div>
    <div>
      <label class="block mb-1 font-medium text-gray-700" for="email">Email:</label>
      <input type="email" id="email" name="email" required class="w-full border rounded-lg px-4 py-2" />
    </div>
    <div>
      <label class="block mb-1 font-medium text-gray-700" for="phone">Telefone:</label>
      <input type="phone" id="phone" name="phone" required class="w-full border rounded-lg px-4 py-2" />
    </div>
    <div>
        <label class="block mb-1 font-medium text-gray-700" for="password">Senha:</label>
        <input type="password" id="password" name="password" required class="w-full border rounded-lg px-4 py-2" />
      </div>
    <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700">
      Cadastrar
    </button>
  </form>
  <p class="mt-4 text-center text-sm text-gray-600">
    Já tem uma conta? <a href="{% url 'users:login' %}" class="text-blue-600 hover:underline">Entrar</a>
  </p>
</div>
{% endblock %}
