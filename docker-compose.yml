services:
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:v2.3.6
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8086:8080"
    environment:
      AUTHENTICATION_API_KEY: apikey321
      CONFIG_SESSION_PHONE_VERSION: 2.3000.1029560485
      BAILEYS_VERSION: 2.3000.1029560485
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@postgres:5432/postgres
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net

  postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5441:5432"
    networks:
      - evolution-net
    command: >
      -c listen_addresses=*
      -c max_connections=200
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c log_min_messages=WARNING
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: evolution_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - evolution-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  barbersystem_database:
    image: postgres:15
    container_name: barbersystem_database
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: barbersystem
    volumes:
      - fastapi_database_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${DATABASE_PORT}:5432"
    networks:
      - barbersystem-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barbersystem"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  fast_api-barber-shop-system-backend:
    container_name: fast_api_barber_shop_system_backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      barbersystem_database:
        condition: service_healthy
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      # Dentro da rede do Docker, o Postgres escuta em 5432 (porta interna do container),
      # independente da porta exposta no host via ${DATABASE_PORT}.
      SQLALCHEMY_DATABASE_URI: postgresql+asyncpg://postgres:postgres@barbersystem_database:5432/barbersystem
      DEBUG: "${DEBUG}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS}"
    volumes:
      - .:/app
    networks:
      - barbersystem-net
    command: uvicorn src.main:app --host 0.0.0.0 --port ${API_PORT}


volumes:
  postgres_data:
  fastapi_database_data:
  evolution_instances:

networks:
  barbersystem-net:
    driver: bridge
  evolution-net:
    driver: bridge
