services:

  barbersystem_database:
    image: postgres:15
    container_name: barbersystem_database
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: barbersystem
    volumes:
      - fastapi_database_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5477:5432"
    networks:
      - barbersystem-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barbersystem"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  fast_api-barber-shop-system-backend:
    container_name: fast_api_barber_shop_system_backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      barbersystem_database:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      SQLALCHEMY_DATABASE_URI: postgresql+asyncpg://postgres:postgres@barbersystem_database:5432/barbersystem
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,barbersystem-api
    volumes:
      - .:/app
    networks:
      - barbersystem-net
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000


volumes:
  postgres_data:
  fastapi_database_data:

networks:
  barbersystem-net:
    driver: bridge