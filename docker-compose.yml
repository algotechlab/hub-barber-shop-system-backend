version: '3.8'

services:
  flask_db:
    image: postgres:15
    container_name: flask_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=barbershop_db
    volumes:
      - flask_db_data:/var/lib/postgresql/data
    ports:
      - "5477:5432"
    command: 
      - "postgres"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "log_min_messages=WARNING"

  flask_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask_app
    depends_on:
      - flask_db
    restart: always
    ports:
      - "8000:8000"
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql://postgres:postgres@flask_db:5432/barbershop_db
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,flask_app
    volumes:
      - .:/app
    command: gunicorn --config gunicorn.conf.py -b 0.0.0.0:8000 manage:app

volumes:
  flask_db_data: